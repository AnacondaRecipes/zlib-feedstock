{% set version = "1.2.11" %}

package:
    name: zlib
    version: {{ version }}

source:
    url: http://zlib.net/zlib-{{ version }}.tar.gz
    sha256: c3e5e9fdd5004dcb542feda5ee4f0ff0744628baf8ed2dd5d66f8ca1197cb1a1

build:
{% if bootstrapping == 'yes' %}
    # Please increment by two
    number: 0
    string: h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}_bootstrapping
{% else %}
    # Keep above the number of the _bootstrapping package
    number: 5
{% endif %}
    run_exports:
        # mostly OK, but some scary symbol removal.  Let's try for trusting them.
        #    https://abi-laboratory.pro/tracker/timeline/zlib/
        - {{ pin_subpackage('zlib', max_pin='x.x') }}

requirements:
    build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}  # [win32]
{% if bootstrapping != 'yes' %}
        - cmake  # [win]
        - msinttypes  # [win and vc<14]
        - make  # [not win]
    host:
        - ripgrep
{% endif %}

test:
    commands:
        - test -f ${PREFIX}/lib/libz.a  # [unix]

about:
    home: http://zlib.net/
    # http://zlib.net/zlib_license.html
    license: zlib
    summary: Massively spiffy yet delicately unobtrusive compression library
    license_family: Other
    license_file: license.txt
    
    description: |
      zlib is designed to be a free, general-purpose, lossless data-compression
      library for use on virtually any computer hardware and operating system.
    doc_url: http://zlib.net/manual.html
    dev_url: https://github.com/madler/zlib

extra:
    recipe-maintainers:
        - groutr
        - msarahan
        - ocefpaf
        - mingwandroid
