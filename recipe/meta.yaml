{% set version = "1.2.13" %}

package:
  name: zlib-split
  version: {{ version }}

source:
  url: https://github.com/madler/zlib/releases/download/v{{ version }}/zlib-{{ version }}.tar.gz
  sha256: b3a24de97a8fdbc835b9833169501030b8977031bcb54b3b3ac13740f846ab30
  # patches:
  #   - cmake-pkg-config.patch

build:
  number: 3
  run_exports:
    # mostly OK, but some scary symbol removal.  Let's try for trusting them.
    #  https://abi-laboratory.pro/tracker/timeline/zlib/
    - {{ pin_subpackage('libzlib', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - make                  # [unix]
  run:

outputs:
  - name: libzlib
    build:
      run_exports:
        # mostly OK, but some scary symbol removal.  Let's try for trusting them.
        #  https://abi-laboratory.pro/tracker/timeline/zlib/
        - {{ pin_subpackage('libzlib', max_pin='x.x') }}
    requirements:
      build:
        - {{ compiler('c') }}
      host:
      run:
    files:
      - lib/libz.so.*          # [linux]
      - lib/libz.*.dylib       # [osx]
      - Library/bin/zlib.dll   # [win]
      - zlib.dll               # [win]
    test:
      commands:
        - test ! -f ${PREFIX}/lib/libz.a              # [unix]
        - test ! -f ${PREFIX}/lib/libz{SHLIB_EXT}     # [unix]
        - test ! -f ${PREFIX}/include/zlib.h          # [unix]
        - if not exist %LIBRARY_BIN%\zlib.dll exit 1  # [win]
        - if not exist %PREFIX%\zlib.dll exit 1       # [win]

  - name: zlib
    requirements:
      build:
        - {{ compiler('c') }}
      host:
        - {{ pin_subpackage('libzlib', exact=True) }}
      run:
        - {{ pin_subpackage('libzlib', exact=True) }}
    files:
      - lib/libz.so            # [linux]
      - lib/libz.dylib         # [osx]
      - include                # [unix]
      - lib/pkgconfig          # [unix]
      - lib/libz.a             # [unix]
      - Library/include        # [win]
      - Library/share          # [win]
      - Library/lib            # [win]
    test:
      commands:
        - test -f ${PREFIX}/lib/libz.a            # [unix]
        - test -f ${PREFIX}/include/zlib.h        # [unix]
        - if not exist %LIBRARY_LIB%\zlibstatic.lib exit 1  # [win]
        - if not exist %LIBRARY_LIB%\zlib.lib exit 1        # [win]
        - if not exist %LIBRARY_INC%\zlib.h exit 1          # [win]


about:
  home: https://zlib.net/
  # http://zlib.net/zlib_license.html
  license: Zlib
  summary: Massively spiffy yet delicately unobtrusive compression library
  license_family: Other
  # Note: we copy 'recipe/license.txt' which contains the header from `zlib.h`.
  # Correct update of this recipe requires an update of `recipe/license.txt`.
  license_file: zlib.h
  description: |
    zlib is designed to be a free, general-purpose, lossless data-compression
    library for use on virtually any computer hardware and operating system.
  doc_url: https://zlib.net/manual.html
  dev_url: https://github.com/madler/zlib

extra:
  recipe-maintainers:
    - groutr
    - msarahan
    - ocefpaf
    - isuruf
  feedstock-name: zlib
