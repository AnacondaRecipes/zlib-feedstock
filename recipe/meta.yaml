{% set name = "zlib" %}
{% set version = "1.3.1" %}
{% set build_num = 0 %}

# Platform-specific prefixes
{% set win_lib_prefix = "Library/" %}
{% set unix_lib_prefix = "lib/" %}

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  url: https://zlib.net/zlib-{{ version }}.tar.gz
  sha256: 9a93b2b7dfdac77ceba5a558a580e74667dd6fede4585b91eefb60f03b72df23

build:
  number: {{ build_num }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - cmake # [win]
    - make  # [unix]

outputs:
  - name: lib{{ name }}
    run_exports:
      - {{ pin_subpackage('libzlib', max_pin='x') }}
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
      run_constrained:
        - {{ name }} {{ version }} *_{{ build_num }}
    files:
      - {{ unix_lib_prefix }}libz.so.*     # [linux]
      - {{ unix_lib_prefix }}libz.*.dylib  # [osx]
      - {{ win_lib_prefix }}bin/zlib.dll   # [win]
      - zlib.dll                           # [win]
    test:
      commands:
        - test ! -f ${PREFIX}/{{ unix_lib_prefix }}libz.a            # [unix]
        - test ! -f ${PREFIX}/{{ unix_lib_prefix }}libz${SHLIB_EXT}  # [unix]
        - test ! -f ${PREFIX}/include/zlib.h                         # [unix]
        - if not exist %LIBRARY_BIN%\zlib.dll exit 1                 # [win]
        - if not exist %PREFIX%\zlib.dll exit 1                      # [win]

  - name: lib{{ name }}-wapi
    build:
      skip: true  # [not win]
      run_exports:
        - {{ pin_subpackage('libzlib-wapi', max_pin='x') }}
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
      run_constrained:
        - {{ name }} {{ version }} *_{{ build_num }}
        - {{ name }}-wapi {{ version }} *_{{ build_num }}
    files:
      - {{ win_lib_prefix }}bin/zlibwapi.dll  # [win]
    test:
      commands:
        - if not exist "%LIBRARY_BIN%\zlibwapi.dll" exit 1  # [win]

  - name: {{ name }}
    build:
      run_exports:
        - {{ pin_subpackage('libzlib', max_pin='x') }}
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
      host:
        - {{ pin_subpackage('libzlib', exact=True) }}
      run:
        - {{ pin_subpackage('libzlib', exact=True) }}
    files:
      - {{ unix_lib_prefix }}libz.so            # [linux]
      - {{ unix_lib_prefix }}libz.dylib         # [osx]
      - include                                 # [unix]
      - {{ unix_lib_prefix }}pkgconfig          # [unix]
      - {{ unix_lib_prefix }}libz.a             # [unix]
      - {{ win_lib_prefix }}include             # [win]
      - {{ win_lib_prefix }}share               # [win]
      - {{ win_lib_prefix }}lib/zlib.lib        # [win]
      - {{ win_lib_prefix }}lib/zdll.lib        # [win]
      - {{ win_lib_prefix }}lib/z.lib           # [win]
      - {{ win_lib_prefix }}lib/zlibstatic.lib  # [win]
      - {{ win_lib_prefix }}lib/pkgconfig       # [win]
    test:
      requires:
        - {{ compiler('c') }}
      files:
        - test_compile_flags.bat
        - test_compile_flags.c
      commands:
        - test -f ${PREFIX}/{{ unix_lib_prefix }}libz.a            # [unix]
        - test -f ${PREFIX}/{{ unix_lib_prefix }}libz${SHLIB_EXT}  # [unix]
        - test -f ${PREFIX}/include/zlib.h                         # [unix]
        - if not exist %LIBRARY_LIB%\zlibstatic.lib exit 1         # [win]
        - if not exist %LIBRARY_LIB%\zlib.lib exit 1               # [win]
        - if not exist %LIBRARY_LIB%\pkgconfig\zlib.pc exit 1      # [win]
        - if not exist %LIBRARY_INC%\zlib.h exit 1                 # [win]
        - if exist %LIBRARY_LIB%\zlibwapi.lib exit 1               # [win]
        - call test_compile_flags.bat                              # [win]

  - name: {{ name }}-wapi
    build:
      skip: true  # [not win]
      run_exports:
        - {{ pin_subpackage('libzlib-wapi', max_pin='x') }}
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
      host:
        - {{ pin_subpackage('libzlib-wapi', exact=True) }}
        - {{ pin_subpackage('zlib', exact=True) }}
      run:
        - {{ pin_subpackage('libzlib-wapi', exact=True) }}
        - {{ pin_subpackage('zlib', exact=True) }}
    files:
      - {{ win_lib_prefix }}lib/zlibwapi.lib   # [win]
      - {{ win_lib_prefix }}include/zlib.h     # [win]
    test:
      requires:
        - {{ compiler('c') }}
      files:
        - test_compile_flags.bat
        - test_compile_flags.c
      commands:
        - if not exist %LIBRARY_LIB%\zlibwapi.lib exit 1   # [win]
        - if not exist %LIBRARY_INC%\zlib.h exit 1         # [win]
        - call test_compile_flags.bat "wapi"               # [win]

about:
  home: https://zlib.net/
  summary: A massively spiffy yet delicately unobtrusive compression library
  description: |
    zlib is designed to be a free, general-purpose, lossless data-compression
    library for use on virtually any computer hardware and operating system.
  license: Zlib
  license_family: OTHER
  license_file: LICENSE
  doc_url: https://zlib.net/manual.html
  dev_url: https://github.com/madler/zlib/tree/v1.3.1

extra:
  recipe-maintainers:
    - groutr
    - msarahan
    - ocefpaf
    - mingwandroid
